services:
  unstoppable:
    build: .
    container_name: unstoppable
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - unstoppable-data:/app/data
      - ./output:/app/output
      - depot-credentials:/home/unstoppable/.local/
      - ./config.yaml:/app/config.yaml:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  unstoppable-data:
  depot-credentials:
